version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: threat-intel-redis
    ports:
      - "6379:6379"
    restart: always

  web:
    build: .
    container_name: threat-intel-web
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CACHE_TTL_SECONDS=3600
    env_file:
      - .env
    depends_on:
      - redis
    restart: always
